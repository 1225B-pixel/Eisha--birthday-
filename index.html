<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 18th Birthday Eishaa ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:linear-gradient(135deg,#ffd6e7,#f6ddff,#ffffff);

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

}

.hidden{

display:none;

}

#passwordPage,
#loading,
#hero{

position:absolute;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}

#passwordPage{

background:linear-gradient(135deg,#111,#000);

}

.passwordBox{

width:90%;

max-width:420px;

padding:40px;

background:rgba(255,255,255,.08);

border-radius:25px;

backdrop-filter:blur(18px);

text-align:center;

box-shadow:0 0 30px rgba(255,0,120,.4);

}

.passwordBox h1{

font-family:"Great Vibes";

font-size:60px;

color:white;

margin-bottom:15px;

}

.passwordBox p{

color:#ddd;

margin-bottom:25px;

}

.passwordBox input{

width:100%;

padding:15px;

font-size:20px;

text-align:center;

border:none;

border-radius:15px;

margin-bottom:20px;

}

.passwordBox button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#ff4f93;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.passwordBox button:hover{

transform:scale(1.05);

}

#loading{

display:none;

background:black;

color:white;

}

.loader{

font-size:70px;

animation:pulse 1s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.3);

}

}

#hero{

display:none;

text-align:center;

padding:20px;

}

.heroTitle{

font-family:"Great Vibes";

font-size:65px;

color:#ff2d75;

}

.heroSub{

font-size:22px;

margin-top:20px;

color:#444;

}

.heroBtn{

margin-top:45px;

padding:18px 40px;

border:none;

border-radius:50px;

background:#ff4f93;

color:white;

font-size:20px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="passwordPage">

<div class="passwordBox">

<h1>Welcome ❤️</h1>

<p>Enter the Secret Password</p>

<input
id="password"
type="password"
maxlength="8"
placeholder="********">

<button onclick="unlock()">

Unlock Surprise

</button>

</div>

</div>

<div id="loading">

<div class="loader">

❤️

</div>

<h2 style="margin-top:20px;font-family:'Great Vibes';font-size:45px;">

Happy 18th Birthday ❤️

</h2>

</div>

<div id="hero">

<h1 class="heroTitle">

Happy 18th Birthday

<br>

Eishaaaa ❤️

</h1>

<p class="heroSub">

Let me make it the most special one.

</p>

<button class="heroBtn">

Open Your Surprise

</button>

</div>

<script>

function unlock(){

let pass=document.getElementById("password").value;

if(pass==="09072008"){

document.getElementById("passwordPage").style.display="none";

document.getElementById("loading").style.display="flex";

setTimeout(function(){

document.getElementById("loading").style.display="none";

document.getElementById("hero").style.display="flex";

},3000);

}

else{

alert("Wrong Password ❤️");

}

}

</script>

</body>

</html>
